# 로컬 개발 전용. 시크릿/DB 자격증명은 환경변수 또는 .env에서 주입.
# 스키마는 Flyway가 자동 적용.
spring:
  jpa:
    show-sql: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/building_note}
    username: ${DB_USERNAME:buildnote}
    password: ${DB_PASSWORD:buildnote}

logging:
  level:
    com.buildingnote: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO
