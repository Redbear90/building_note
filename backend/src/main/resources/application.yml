spring:
  application:
    name: building-note

  profiles:
    active: ${SPRING_PROFILE:local}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: none              # Flyway가 스키마를 관리. JPA는 자동 변경하지 않음.
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true     # 기존 DB에도 baseline 자동 기록
    baseline-version: 0
    validate-on-migrate: true

  servlet:
    session:
      cookie:
        same-site: strict

# JWT 설정 — 비밀키는 반드시 환경변수로
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000        # 1h
  refresh-token-expiration: 2592000000    # 30d

# CORS 허용 오리진 (콤마 구분)
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:4173}

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Actuator — 운영에서 헬스체크만 노출
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.buildingnote: INFO
    org.hibernate.SQL: WARN
